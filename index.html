<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order summary</title>
    <link rel="icon" href="./assets/img/favicon-32x32.png" type="icon">
    <link rel="stylesheet" href="./mobile.css">
    <link rel="stylesheet" href="./css/desktop.css" media="(min-width:376px)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <picture class="container__img">
            <source media="(min-width:376px)" srcset="./assets/icons/pattern-background-desktop.svg">
            <img class="container__img__ola" src="./assets/icons/pattern-background-mobile.svg" alt="imagen de fondo">
        </picture>
        <section class="card">
            <img class="card__img-cover" src="./assets/icons/illustration-hero.svg" alt="mujer escuchando musica">
            <article class="card__cont-info">
                <h1 class="card__cont-info__title">Order Summary</h1>
                <p class="card__cont-info__text">You can now listen to millons of songs, audiobooks, and podcast on any device anywhere you like!</p>
            </article>
            <article class="box-plans">
                <img class="box-plans__icon" src="./assets/icons/icon-music.svg" alt="icono de musica">
                <section class="box-plans__info-plan">
                    <p class="box-plans__info-plan__name">Annual Plan</p>
                    <p class="box-plans__info-plan__price">$59.99/year</p>
                </section>
                <a class="box-plans__link" href="/">Change</a>
            </article>
            <button class="boton-pay">Proceed to Payment</button>
            <article class="card__container_link">
                <a class="card__link-cancel-order" href="/">Cancel Order</a>
            </article>
        </section>
    </main>
</body>
</html>
